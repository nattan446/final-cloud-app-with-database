<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Detail</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1>{{ course.name }}</h1>
        <div class="card">
            <div class="card-header">Lessons</div>
            <ul class="list-group list-group-flush">
                {% for lesson in course.lesson_set.all %}
                    <li class="list-group-item">{{ lesson.title }}</li>
                {% endfor %}
            </ul>
        </div>
        
        <!-- Assessment Exam Feature -->
        <button class="btn btn-primary btn-block my-4" data-toggle="collapse" data-target="#exam">Start Exam</button>
        <div id="exam" class="collapse">
            <form id="questionform" action="{% url 'onlinecourse:submit' course.id %}" method="post">
                {% csrf_token %}
                {% for question in course.question_set.all %}
                    <div class="card mt-4">
                        <div class="card-header">
                            <h5>{{ question.content }}</h5>
                        </div>
                        <div class="card-body">
                            {% for choice in question.choice_set.all %}
                                <div class="form-check">
                                    <input type="radio" class="form-check-input" name="choice_{{ question.id }}" id="choice_{{ choice.id }}" value="{{ choice.id }}">
                                    <label class="form-check-label" for="choice_{{ choice.id }}">{{ choice.content }}</label>
                                </div>
                            {% endfor %}
                        </div>
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-success mt-4">Submit</button>
            </form>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
